  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Nunito', sans-serif; }

  .label {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .swatch-row { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.08); }
  .swatch {
    flex: 1;
    height: 72px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 6px 8px;
    font-size: 11px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: flex 0.2s;
    cursor: pointer;
    min-width: 0;
  }
  .swatch:hover { flex: 2; }
  .swatch .hex { font-size: 10px; opacity: 0.7; margin-top: 1px; }

  .dark-card {
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .font-hero {
    line-height: 1.1;
    font-weight: 800;
  }
  .font-sub {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.5;
    color: #aaa;
    margin-top: 4px;
  }
  .font-sample-chars {
    font-size: 13px;
    color: #555;
    letter-spacing: 1px;
    margin-top: 6px;
    font-weight: 600;
  }

  .illus-placeholder {
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    text-align: center;
    padding: 12px;
  }

  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
  }

  .rec-badge {
    background: oklch(0.75 0.18 55);
    color: #1a0a00;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    font-family: 'Nunito', sans-serif;
  }

  /* Mini dark UI preview */
  .mini-ui {
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.1);
  }
  .mini-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    font-weight: 800;
    font-size: 15px;
  }
  .mini-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .mini-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .mini-coin {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .mini-btn {
    border-radius: 50px;
    padding: 8px 18px;
    font-weight: 800;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    border: none;
    cursor: pointer;
    text-align: center;
  }
</style>

function MiniLeaderboard({ accent, bg900, bg800, bg700, border, fontStyle, fontName }) {
  const rows = [
    { rank: '🥇', name: 'Dev Patel', coins: 47, color: accent },
    { rank: '2', name: 'Rajan S.', coins: 38, color: null },
    { rank: '3', name: 'You', coins: 31, color: null, you: true },

    <div className="mini-ui" style={{ background: bg800, borderColor: border, ...fontStyle }}>
      <div className="mini-topbar" style={{ background: bg900, color: '#fff', borderBottom: `1px solid ${border}` }}>

      {rows.map((r, i) => (
        <div className="mini-row" key={i} style={{
          background: r.you ? `${accent}15` : 'transparent',
          borderColor: border,
          borderLeft: r.you ? `3px solid ${accent}` : '3px solid transparent',
        }}>
          <span style={{ width: 20, fontSize: 14, textAlign: 'center' }}>{r.rank}</span>
          <div className="mini-avatar" style={{ background: bg700 }} />
          <span style={{ flex: 1, fontSize: 14, color: r.you ? accent : '#ddd', fontWeight: r.you ? 800 : 600 }}>{r.name}</span>
          <div className="mini-coin" style={{ background: `${accent}22`, color: accent }}>{r.coins}</div>
        </div>
      ))}
      <div style={{ padding: '10px 14px' }}>
        <div className="mini-btn" style={{ background: accent, color: '#fff', width: '100%' }}>
          + Nominate someone
        </div>
      </div>
    </div>
  );
}

                  { size: 32, weight: 800, label: 'H1 — Page title', text: 'Leaderboard' },
                  { size: 20, weight: 700, label: 'H2 — Section', text: 'This Month' },
                  { size: 15, weight: 600, label: 'Body', text: 'Dev nominated Rajan for Best Catch' },
                  { size: 12, weight: 600, label: 'Caption', text: 'NOMINATIONS · MAY 2026' },
                ].map((s, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6 }}>
                    <div style={{ width: 64, fontSize: 10, color: '#555', fontFamily: 'Nunito', fontWeight: 700 }}>{s.label}</div>
                    <div style={{ ...font.style, fontSize: s.size, fontWeight: s.weight, color: '#fff', lineHeight: 1.2 }}>{s.text}</div>
                  </div>
                ))}
              </div>

              <div style={{ fontSize: 12, color: '#666', fontFamily: 'Nunito', fontStyle: 'italic', lineHeight: 1.5 }}>{font.note}</div>
            </div>
          </DCArtboard>
        ))}

      </DCSection>

      {/* ── SECTION 4: ILLUSTRATION STYLES ── */}
      <DCSection id="illus-style" title="04 · Illustration Style Options">

        {illustStyles.map(style => (
          <DCArtboard key={style.id} id={`illus-${style.id}`} label={`${style.name}${style.rec ? ' ⭐ Recommended' : ''}`} width={380} height={460}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14, padding: 4 }}>
              <div>
                <div style={{ fontFamily: 'Nunito', fontWeight: 800, fontSize: 18, color: '#fff', display: 'flex', alignItems: 'center', gap: 8 }}>
                  {style.name}
                  {style.rec && <span className="rec-badge">⭐ PICK</span>}
                </div>
                <div style={{ fontSize: 13, color: '#888', fontFamily: 'Nunito', marginTop: 3, lineHeight: 1.5 }}>{style.desc}</div>
              </div>

              {/* Colour palette for this style */}
              <div style={{ display: 'flex', gap: 6 }}>
                {style.colors.map((c, i) => (
                  <div key={i} style={{ width: 32, height: 32, borderRadius: 8, background: c, border: '1.5px solid rgba(255,255,255,0.1)' }} />
                ))}
              </div>

              {/* 3 placeholder illustration slots */}
              <div style={{ display: 'flex', gap: 8 }}>
                {[
                  { emoji: '🏅', label: 'Nomination\nSent' },
                  { emoji: '🏆', label: 'Month\nWinner' },
                  { emoji: '🪙', label: 'Coin\nSelector' },
                ].map((item, i) => (
                  <div key={i} className="illus-placeholder" style={{
                    flex: 1, height: 110, background: style.bg,
                    border: `2px dashed ${style.colors[0]}44`,
                    color: style.colors[0],
                    fontSize: 12,
                  }}>
                    <div style={{ fontSize: 32 }}>{item.emoji}</div>
                    <div style={{ fontSize: 11, color: '#888', whiteSpace: 'pre-line', textAlign: 'center', fontFamily: 'Nunito', fontWeight: 700 }}>{item.label}</div>
                  </div>
                ))}
              </div>

              {/* Style characteristics */}
              <div style={{ background: '#111', borderRadius: 10, padding: 12, display: 'flex', flexDirection: 'column', gap: 6 }}>
                <div style={{ fontSize: 11, color: '#666', fontFamily: 'Nunito', fontWeight: 700 }}>CHARACTERISTICS</div>
                {style.id === 'bold-flat' && ['Thick black outlines (3-4px)', 'Flat colour fills', 'Expressive, simple faces', 'High contrast on dark bg', 'Works at small sizes too'].map((c, i) => (
                  <div key={i} style={{ fontSize: 13, color: '#aaa', fontFamily: 'Nunito' }}>✓ {c}</div>
                ))}
                {style.id === 'hand-drawn' && ['Rough, imperfect lines', 'Textured / scratchy fills', 'Very personal and warm', 'Harder to make consistent', 'Needs a skilled illustrator'].map((c, i) => (
                  <div key={i} style={{ fontSize: 13, color: '#aaa', fontFamily: 'Nunito' }}>{'i === 3 || i === 4' ? '⚠' : '✓'} {c}</div>
                ))}
                {style.id === '3d-clay' && ['Soft rounded 3D shapes', 'Pastel + saturated fills', 'Very modern / premium feel', 'Harder to produce quickly', 'Needs 3D software or AI gen'].map((c, i) => (
                  <div key={i} style={{ fontSize: 13, color: '#aaa', fontFamily: 'Nunito' }}>✓ {c}</div>
                ))}
              </div>

              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {style.id === 'bold-flat' && ['Duolingo', 'Notion', 'Headspace'].map(ref => (
                  <span key={ref} className="tag" style={{ background: '#222', color: '#666', fontFamily: 'Nunito' }}>ref: {ref}</span>
                ))}
                {style.id === 'hand-drawn' && ['Mailchimp', 'Basecamp', 'Linear'].map(ref => (
                  <span key={ref} className="tag" style={{ background: '#222', color: '#666', fontFamily: 'Nunito' }}>ref: {ref}</span>
                ))}
                {style.id === '3d-clay' && ['Notion avatars', 'Apple emojis', 'Lottie'].map(ref => (
                  <span key={ref} className="tag" style={{ background: '#222', color: '#666', fontFamily: 'Nunito' }}>ref: {ref}</span>
                ))}
              </div>
            </div>
          </DCArtboard>
        ))}

      </DCSection>

      {/* ── SECTION 5: ILLUSTRATIONS NEEDED ── */}
      <DCSection id="illus-list" title="05 · Illustrations Needed">

        <DCArtboard id="illus-table" label="Full Illustration List" width={780} height={580}>
          <div style={{ padding: 8 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 2fr auto', gap: 0, fontFamily: 'Nunito' }}>
              {/* Header */}
              {['Screen', 'Name', 'Description', 'Priority'].map((h, i) => (
                <div key={i} style={{
                  fontSize: 11, fontWeight: 800, color: '#555', letterSpacing: 1.5,
                  textTransform: 'uppercase', padding: '8px 10px',
                  borderBottom: '1px solid #222',
                }}>
                  {h}
                </div>
              ))}
              {/* Rows */}
              {illustrationList.map((ill, i) => (
                <React.Fragment key={i}>
                  <div style={{ padding: '10px', borderBottom: '1px solid #1a1a1a', fontSize: 13, color: '#666', display: 'flex', alignItems: 'center' }}>{ill.screen}</div>
                  <div style={{ padding: '10px', borderBottom: '1px solid #1a1a1a', fontSize: 14, color: '#fff', fontWeight: 700, display: 'flex', alignItems: 'center' }}>{ill.name}</div>
                  <div style={{ padding: '10px', borderBottom: '1px solid #1a1a1a', fontSize: 13, color: '#888', display: 'flex', alignItems: 'center', lineHeight: 1.4 }}>{ill.desc}</div>
                  <div style={{ padding: '10px', borderBottom: '1px solid #1a1a1a', display: 'flex', alignItems: 'center' }}>
                    <span style={{
                      padding: '3px 10px', borderRadius: 20, fontSize: 12, fontWeight: 800,
                      background: ill.priority === 'MVP' ? '#FF6B00' : ill.priority === 'V2' ? '#2a2000' : '#1a1a1a',
                      color: ill.priority === 'MVP' ? '#fff' : ill.priority === 'V2' ? '#ffb300' : '#555',
                      border: ill.priority === 'Later' ? '1px solid #333' : 'none',
                      whiteSpace: 'nowrap',
                    }}>
                      {ill.priority}
                    </span>
                  </div>
                </React.Fragment>
              ))}
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="illus-notes" label="Illustration Brief Notes" width={320} height={580}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, padding: 4, fontFamily: 'Nunito' }}>
            <div style={{ background: '#1e1610', borderRadius: 12, padding: 16, border: '1.5px solid #3a2c1f' }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: '#FF6B00', marginBottom: 8 }}>Style Brief</div>
              <div style={{ fontSize: 13, color: '#aaa', lineHeight: 1.6 }}>
                Use <b style={{ color: '#fff' }}>Bold Flat</b> style throughout.<br />
                Primary palette: <b style={{ color: '#FF6B00' }}>Blaze orange</b> + <b style={{ color: '#FFD166' }}>gold</b> + white on dark.<br />
                All illustrations should feel <b style={{ color: '#fff' }}>sporty, joyful and energetic</b> — like cricket sticker packs, not corporate icons.
              </div>
            </div>

            <div style={{ background: '#111', borderRadius: 12, padding: 16, border: '1.5px solid #222' }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: '#fff', marginBottom: 8 }}>Recommended Sizes</div>
              {[
                { use: 'Hero / onboarding', size: '320×280px' },
                { use: 'Empty states', size: '200×180px' },
                { use: 'Confirmation screen', size: '240×200px' },
                { use: 'Avatar placeholder', size: '80×80px (circle)' },
                { use: 'Coin / badge icon', size: '48×48px' },
              ].map((s, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                  <div style={{ fontSize: 12, color: '#666' }}>{s.use}</div>
                  <div style={{ fontSize: 12, color: '#FF6B00', fontWeight: 700 }}>{s.size}</div>
                </div>
              ))}
            </div>

            <div style={{ background: '#111', borderRadius: 12, padding: 16, border: '1.5px solid #222' }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: '#fff', marginBottom: 8 }}>Format</div>
              <div style={{ fontSize: 13, color: '#aaa', lineHeight: 1.6 }}>
                Export as <b style={{ color: '#fff' }}>SVG</b> for scalability + small file size.<br />
                Lottie JSON for any animated variants (celebration, coin spin).<br />
                PNG fallback at 2× for older browsers.
              </div>
            </div>

            <div style={{ background: '#1e1610', borderRadius: 12, padding: 16, border: '1.5px solid #FF6B0030' }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: '#FF6B00', marginBottom: 6 }}>Where to source</div>
              <div style={{ fontSize: 12, color: '#888', lineHeight: 1.7 }}>
                → <b style={{ color: '#ccc' }}>undraw.co</b> — free, customisable<br />
                → <b style={{ color: '#ccc' }}>storyset.com</b> — animated options<br />
                → <b style={{ color: '#ccc' }}>Figma community</b> — sports packs<br />
                → <b style={{ color: '#ccc' }}>Custom via Fiverr</b> — for branded ones
              </div>
            </div>
          </div>
        </DCArtboard>

      </DCSection>

    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
