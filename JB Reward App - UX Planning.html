<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB Reward App — UX Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f0e8; font-family: 'Caveat', cursive; }

  /* Sketchy box */
  .sketch-box {
    border: 2.5px solid #1a1a1a;
    border-radius: 4px;
    box-shadow: 3px 3px 0 #1a1a1a;
    background: #fff;
    position: relative;
  }
  .sketch-box.yellow { background: #fffbe6; }
  .sketch-box.blue { background: #e8f4fd; }
  .sketch-box.green { background: #eafaf1; }
  .sketch-box.red { background: #fdf0f0; }
  .sketch-box.purple { background: #f5f0ff; }

  .section-title {
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 16px;
    border-bottom: 1.5px dashed #ccc;
    padding-bottom: 6px;
  }

  .persona-card {
    border: 2.5px solid #1a1a1a;
    border-radius: 6px;
    box-shadow: 4px 4px 0 #1a1a1a;
    padding: 16px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .persona-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2.5px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .persona-name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
  }
  .persona-role {
    font-size: 14px;
    color: #888;
    font-family: 'Special Elite', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .persona-tag {
    display: inline-block;
    padding: 2px 10px;
    border: 1.5px solid #1a1a1a;
    border-radius: 20px;
    font-size: 13px;
    margin: 2px;
    background: #f9f9f9;
  }
  .persona-section-label {
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'Special Elite', monospace;
    margin-bottom: 4px;
  }
  .persona-text {
    font-size: 16px;
    line-height: 1.4;
    color: #1a1a1a;
  }

  /* Flow diagram */
  .flow-step {
    border: 2px solid #1a1a1a;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 15px;
    background: #fff;
    text-align: center;
    box-shadow: 2px 2px 0 #1a1a1a;
    flex-shrink: 0;
  }
  .flow-step.decision {
    transform: rotate(0deg);
    background: #fffbe6;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    width: 100px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border: none;
    box-shadow: none;
    position: relative;
  }
  .flow-step.decision::before {
    content: '';
    position: absolute;
    inset: -3px;
    background: #1a1a1a;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    z-index: -1;
  }
  .flow-arrow {
    font-size: 20px;
    color: #1a1a1a;
    flex-shrink: 0;
    align-self: center;
  }
  .flow-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .flow-note {
    font-size: 13px;
    color: #888;
    font-style: italic;
    margin-top: 4px;
  }

  /* IA tree */
  .ia-node {
    border: 2px solid #1a1a1a;
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 15px;
    background: #fff;
    text-align: center;
    box-shadow: 2px 2px 0 #1a1a1a;
    white-space: nowrap;
  }
  .ia-node.root {
    background: #1a1a1a;
    color: #fff;
    font-weight: 700;
    font-size: 17px;
    box-shadow: 3px 3px 0 #555;
  }
  .ia-node.section {
    background: #fffbe6;
    font-weight: 700;
  }
  .ia-branch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .ia-children {
    display: flex;
    gap: 12px;
    position: relative;
  }
  .ia-line-v {
    width: 2px;
    height: 20px;
    background: #1a1a1a;
  }
  .ia-line-h {
    height: 2px;
    background: #1a1a1a;
    position: absolute;
    top: 0;
  }

  /* Feature table */
  .feat-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }
  .feat-table th {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #666;
    border-bottom: 2px solid #1a1a1a;
    padding: 6px 8px;
    text-align: left;
  }
  .feat-table td {
    padding: 7px 8px;
    border-bottom: 1px dashed #ddd;
    vertical-align: top;
  }
  .feat-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: 1.5px solid #1a1a1a;
  }
  .badge.mvp { background: #1a1a1a; color: #fff; }
  .badge.v2 { background: #fffbe6; color: #1a1a1a; }
  .badge.later { background: #f5f0ff; color: #1a1a1a; }

  /* Screen wireframes */
  .screen {
    border: 2.5px solid #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 4px 4px 0 #1a1a1a;
    background: #fff;
    display: flex;
    flex-direction: column;
  }
  .screen-bar {
    background: #1a1a1a;
    color: #fff;
    padding: 8px 12px;
    font-size: 14px;
    font-family: 'Special Elite', monospace;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .screen-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  .screen-content { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .wf-bar {
    background: #e8e8e8;
    border-radius: 3px;
    display: flex;
    align-items: center;
    padding: 0 8px;
  }
  .wf-rect {
    background: #e8e8e8;
    border: 1.5px solid #ccc;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #888;
  }
  .wf-pill {
    background: #1a1a1a;
    color: #fff;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    display: inline-block;
  }
  .wf-pill.outline {
    background: #fff;
    color: #1a1a1a;
    border: 1.5px solid #1a1a1a;
  }
  .wf-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #e8e8e8;
    border: 1.5px solid #ccc;
    flex-shrink: 0;
  }
  .wf-divider { border: none; border-top: 1px dashed #ddd; }
  .wf-label { font-size: 12px; color: #aaa; font-family: 'Special Elite', monospace; letter-spacing: 0.5px; }
  .wf-bold { font-size: 16px; font-weight: 700; }
  .wf-coin { 
    width: 22px; height: 22px; border-radius: 50%; 
    background: #fffbe6; border: 2px solid #f0c040;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #b8860b;
  }

  .sticky {
    background: #fffbe6;
    border: 1.5px solid #e0d080;
    border-radius: 3px;
    padding: 8px 10px;
    font-size: 14px;
    line-height: 1.4;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.08);
    transform: rotate(-0.5deg);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── PERSONAS ────────────────────────────────────────────────
function PersonaCard({ emoji, bg, name, role, age, quote, goals, painPoints, techLevel, tags }) {
  return (
    <div className="persona-card" style={{ background: bg }}>
      <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
        <div className="persona-avatar" style={{ background: bg, fontSize: 28 }}>{emoji}</div>
        <div>
          <div className="persona-name">{name}</div>
          <div className="persona-role">{role} · {age}</div>
        </div>
      </div>
      <div className="sketch-box" style={{ padding: '10px 14px', background: '#fffcf0', borderStyle: 'dashed' }}>
        <span style={{ fontSize: 17, fontStyle: 'italic', color: '#444' }}>"{quote}"</span>
      </div>
      <div>
        <div className="persona-section-label">Goals</div>
        {goals.map((g, i) => <div key={i} className="persona-text">→ {g}</div>)}
      </div>
      <div>
        <div className="persona-section-label">Pain Points</div>
        {painPoints.map((p, i) => <div key={i} className="persona-text">✗ {p}</div>)}
      </div>
      <div>
        <div className="persona-section-label">Tech comfort</div>
        <div style={{ display: 'flex', gap: 4 }}>
          {[1,2,3,4,5].map(n => (
            <div key={n} style={{
              width: 18, height: 18, borderRadius: 3,
              background: n <= techLevel ? '#1a1a1a' : '#e0e0e0',
              border: '1.5px solid #1a1a1a'
            }}></div>
          ))}
        </div>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
        {tags.map((t, i) => <span key={i} className="persona-tag">{t}</span>)}
      </div>
    </div>
  );
}

// ─── FLOW ────────────────────────────────────────────────────
function FlowStep({ label, type, color }) {
  if (type === 'arrow') return <div className="flow-arrow">→</div>;
  if (type === 'down') return <div className="flow-arrow" style={{ transform: 'rotate(90deg)' }}>→</div>;
  return (
    <div className="flow-step" style={color ? { background: color } : {}}>
      {label}
    </div>
  );
}

function Flow({ steps }) {
  return (
    <div className="flow-row" style={{ flexWrap: 'wrap' }}>
      {steps.map((s, i) => {
        if (s === '→') return <FlowStep key={i} type="arrow" />;
        if (s === '↓') return <FlowStep key={i} type="down" />;
        if (typeof s === 'string') return <FlowStep key={i} label={s} />;
        return <FlowStep key={i} label={s.label} color={s.color} />;
      })}
    </div>
  );
}

// ─── SCREEN WIRES ────────────────────────────────────────────
function ScreenWire({ title, children, width = 240, height = 400 }) {
  return (
    <div className="screen" style={{ width, minHeight: height }}>
      <div className="screen-bar">
        <div className="dot"></div>
        <div className="dot"></div>
        <span style={{ marginLeft: 4, fontSize: 12 }}>{title}</span>
      </div>
      <div className="screen-content">{children}</div>
    </div>
  );
}

// ─── IA DIAGRAM ──────────────────────────────────────────────
function IANode({ label, type = 'child', children }) {
  return (
    <div className="ia-branch" style={{ alignItems: 'center' }}>
      <div className={`ia-node ${type}`}>{label}</div>
      {children && (
        <>
          <div className="ia-line-v" />
          <div style={{ position: 'relative', display: 'flex', gap: 12 }}>
            {/* horizontal line connecting siblings */}
            {children.length > 1 && (
              <div style={{
                position: 'absolute',
                top: 0,
                left: '50%',
                transform: 'translateX(-50%)',
                height: 2,
                background: '#1a1a1a',
                width: `calc(100% - 60px)`
              }} />
            )}
            {children.map((child, i) => (
              <div key={i} className="ia-branch">
                <div className="ia-line-v" />
                {child}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="JB Reward App — UX Planning">

      {/* ===== SECTION 1: PERSONAS ===== */}
      <DCSection id="personas" title="01 · Personas">

        <DCArtboard id="p1" label="The Captain 🏏" width={320} height={560}>
          <PersonaCard
            emoji="🏏"
            bg="#eafaf1"
            name="Rajan"
            role="Captain / Admin"
            age="34"
            quote="I need everyone accountable and motivated — and I want it to feel fun, not like a job."
            goals={[
              "Keep the squad engaged all season",
              "Recognise standout performers quickly",
              "Manage nominations fairly and transparently"
            ]}
            painPoints={[
              "WhatsApp polls get buried and ignored",
              "Hard to track who's contributed what",
              "Awkward calling people out directly"
            ]}
            techLevel={4}
            tags={["Organiser", "Competitive", "Fairness-driven", "WhatsApp power user"]}
          />
        </DCArtboard>

        <DCArtboard id="p2" label="The Keen Player 🌟" width={320} height={560}>
          <PersonaCard
            emoji="⭐"
            bg="#e8f4fd"
            name="Dev"
            role="Active Player (paid)"
            age="27"
            quote="I wanna know where I stand and give big ups to the lads who deserve it."
            goals={[
              "See his rank on the leaderboard",
              "Nominate mates after a good match",
              "Earn coins and top the table"
            ]}
            painPoints={[
              "Forgets to nominate before deadline",
              "Doesn't want a complex UI — just quick actions",
              "Wants recognition to feel meaningful"
            ]}
            techLevel={4}
            tags={["Competitive", "Mobile-first", "Social", "FOMO-driven"]}
          />
        </DCArtboard>

        <DCArtboard id="p3" label="The Casual 😎" width={320} height={560}>
          <PersonaCard
            emoji="😎"
            bg="#fffbe6"
            name="Tariq"
            role="Active Player (paid)"
            age="39"
            quote="I'm here for the cricket and the banter, not the admin."
            goals={[
              "Check the leaderboard occasionally",
              "Nominate someone when it's obvious",
              "Not be bothered by notifications"
            ]}
            painPoints={[
              "Too many clicks = won't bother",
              "Forgets sign-in details",
              "Confused by too many categories"
            ]}
            techLevel={2}
            tags={["Low-effort", "Occasional user", "Needs nudges", "Values simplicity"]}
          />
        </DCArtboard>

        <DCArtboard id="p4" label="The Lurker 👀" width={320} height={560}>
          <PersonaCard
            emoji="👀"
            bg="#f5f0ff"
            name="Priya"
            role="Guest / Spectator"
            age="31"
            quote="I want to see what's going on — I'm not playing but I'm interested!"
            goals={[
              "View the leaderboard",
              "See who got nominated and why",
              "Understand the team dynamics"
            ]}
            painPoints={[
              "No reason to sign up fully",
              "Might feel excluded without full access",
              "Can't participate — just observe"
            ]}
            techLevel={3}
            tags={["Read-only", "Supporter", "Curious", "Occasional visitor"]}
          />
        </DCArtboard>

        <DCArtboard id="p5" label="The Wannabe 🏃" width={320} height={560}>
          <PersonaCard
            emoji="🏃"
            bg="#fdf0f0"
            name="Omar"
            role="Signed up, not yet paid"
            age="25"
            quote="I've signed up but haven't sorted the £10 yet — am I in or not?"
            goals={[
              "Understand what he's missing by not paying",
              "Check the leaderboard (limited access)",
              "Get nudged to complete registration"
            ]}
            painPoints={[
              "Uncertain about what full access gives him",
              "Might drop off if onboarding is confusing",
              "Needs a clear CTA to pay and join"
            ]}
            techLevel={3}
            tags={["Pending user", "Needs conversion", "FOMO potential", "Needs clear value prop"]}
          />
        </DCArtboard>

      </DCSection>

      {/* ===== SECTION 2: USER FLOWS ===== */}
      <DCSection id="flows" title="02 · User Flows">

        <DCArtboard id="f1" label="Flow A — Nomination (Active Player)" width={720} height={400}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, padding: 8 }}>
            <div className="section-title">Rajan / Dev nominate a teammate</div>
            <Flow steps={[
              { label: '🏠 Home / Leaderboard', color: '#eafaf1' },
              '→',
              { label: '+ Nominate button', color: '#fffbe6' },
              '→',
              { label: 'Pick teammate', color: '#e8f4fd' },
              '→',
              { label: 'Choose category', color: '#e8f4fd' },
              '→',
              { label: 'Set coin amount (1–10)', color: '#fffbe6' },
              '→',
              { label: 'Add a note (optional)', color: '#fffbe6' },
              '→',
              { label: '✅ Submit', color: '#eafaf1' }
            ]} />
            <hr className="wf-divider" />
            <div className="flow-note">⚠ Cannot nominate yourself · Coin slider 1–10 · Category required · Note optional</div>
            <div className="flow-note">📅 All nominations accumulate during the month → average coins awarded on reset day</div>
            <div style={{ display: 'flex', gap: 12, marginTop: 8 }}>
              <div className="sticky">Category examples:<br/>🏆 Best catch<br/>😂 Best banter<br/>💪 Most effort<br/>🎯 Top scorer</div>
              <div className="sticky">Coin average:<br/>Dev gives 8<br/>Rajan gives 6<br/>Tariq gives 4<br/>→ Award = <b>6 coins</b></div>
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="f2" label="Flow B — Sign Up & Onboarding" width={720} height={420}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, padding: 8 }}>
            <div className="section-title">Omar signs up for the first time</div>
            <Flow steps={[
              { label: '🔗 Invite link (WhatsApp)', color: '#fffbe6' },
              '→',
              { label: 'Landing page', color: '#e8f4fd' },
              '→',
              { label: 'Sign up (name + email)', color: '#e8f4fd' },
              '→',
              { label: '✅ Account created\n(Pending status)', color: '#fffbe6' },
            ]} />
            <div style={{ marginTop: 4, marginLeft: 8 }}>
              <div className="flow-note">At this point Omar has <b>read-only leaderboard access</b></div>
            </div>
            <Flow steps={[
              { label: 'Prompted: Pay £10 to unlock', color: '#fdf0f0' },
              '→',
              { label: 'Payment flow (later)', color: '#e8e8e8' },
              '→',
              { label: '✅ Full access\n(Active Player)', color: '#eafaf1' },
            ]} />
            <hr className="wf-divider" />
            <div className="flow-note">💡 Pending users see the leaderboard but can't nominate — creates FOMO to complete payment</div>
          </div>
        </DCArtboard>

        <DCArtboard id="f3" label="Flow C — View Leaderboard (Guest)" width={500} height={360}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, padding: 8 }}>
            <div className="section-title">Priya (guest) checks the leaderboard</div>
            <Flow steps={[
              { label: '🔗 Shared link', color: '#fffbe6' },
              '→',
              { label: 'Leaderboard (read-only)', color: '#f5f0ff' },
              '→',
              { label: 'Tap a player row', color: '#f5f0ff' },
              '→',
              { label: 'Player profile\n(nominations feed)', color: '#f5f0ff' },
            ]} />
            <hr className="wf-divider" />
            <div className="flow-note">Guests see: rank, name, coin total, recent nominations</div>
            <div className="flow-note">Guests cannot: nominate, sign in, or see pending amounts</div>
            <Flow steps={[
              { label: 'Soft CTA: "Join the team →"', color: '#fffbe6' },
            ]} />
          </div>
        </DCArtboard>

        <DCArtboard id="f4" label="Flow D — Month End Reset (Admin)" width={600} height={380}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, padding: 8 }}>
            <div className="section-title">Rajan runs the monthly reset</div>
            <Flow steps={[
              { label: '📅 Month ends', color: '#fffbe6' },
              '→',
              { label: 'Admin reviews nominations', color: '#eafaf1' },
              '→',
              { label: 'System calculates averages', color: '#e8f4fd' },
            ]} />
            <Flow steps={[
              { label: 'Awards published\n(notifications sent)', color: '#eafaf1' },
              '→',
              { label: 'Leaderboard archived', color: '#e8e8e8' },
              '→',
              { label: '🔄 New month begins\n(coins reset to 0)', color: '#fffbe6' },
            ]} />
            <hr className="wf-divider" />
            <div className="flow-note">⚙ Admin-triggered or automatic? → Recommend: auto-run + admin confirm</div>
            <div className="flow-note">📊 Archive shown in "History" section so past winners are preserved</div>
          </div>
        </DCArtboard>

      </DCSection>

      {/* ===== SECTION 3: INFORMATION ARCHITECTURE ===== */}
      <DCSection id="ia" title="03 · Information Architecture">

        <DCArtboard id="ia1" label="Site Map" width={860} height={500}>
          <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 0, alignItems: 'center' }}>
            <div className="ia-node root" style={{ marginBottom: 0 }}>🏏 JB Reward App</div>
            <div className="ia-line-v" style={{ height: 24 }} />
            <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>

              {/* PUBLIC */}
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
                <div className="ia-node section">🌐 Public</div>
